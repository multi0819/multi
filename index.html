<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>학습 기록 앱</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; padding: 0 10px 80px; margin: 0; background-color: #f4f7f6; min-height: 101vh; overflow-x: hidden; width: 100%; }
        
        .header { position: sticky; top: 0; background: #f4f7f6; padding: 10px 0; z-index: 100; border-bottom: 1px solid #ddd; width: 100%; }
        .status-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; width: 100%; }
        .title { font-size: 16px; font-weight: bold; }
        
        .search-box { display: flex; gap: 4px; width: 100%; align-items: center; }
        #searchInput { flex: 1; padding: 8px; border: 1px solid #bbb; border-radius: 5px; font-size: 13px; min-width: 0; width: 100%; }
        .find-btn { padding: 8px 8px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 11px; white-space: nowrap; flex-shrink: 0; min-width: 65px; text-align: center; }

        .input-group { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-top: 10px; width: 100%; }
        input[type="number"], textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #007bff; border-radius: 8px; font-size: 16px; outline: none; }
        
        .symbol-pad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; margin: 8px 0; background: #e9ecef; padding: 5px; border-radius: 8px; width: 100%; }
        .sym-btn { aspect-ratio: 1.1; background: white; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; width: 100%; }
        .sym-btn.sup { color: #ff5722; font-size: 16px; }

        button#saveBtn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; }
        
        .record-item { background: white; padding: 12px; margin-top: 10px; border-radius: 10px; border-left: 5px solid #007bff; position: relative; width: 100%; word-break: break-all; overflow: hidden; }
        .record-date { font-size: 11px; color: #888; margin-bottom: 5px; }
        .memo-text { white-space: pre-wrap; font-size: 15px; line-height: 1.5; padding-bottom: 45px; word-wrap: break-word; }
        
        .action-btns { position: absolute; bottom: 8px; right: 8px; display: flex; gap: 5px; }
        .act-btn { padding: 6px 12px; border: none; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .edit-btn { background: #ffc107; color: black; }
        .del-btn { background: #dc3545; color: white; }

        /* 찾기 강조색 */
        mark.match { background-color: yellow; color: black; border-radius: 2px; }
        mark.current-match { background-color: orange !important; border: 1px solid red; }

        @media (max-width: 320px) {
            .sym-btn { font-size: 12px; padding: 4px 0; }
            .find-btn { font-size: 10px; min-width: 60px; padding: 8px 6px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="status-line">
            <span class="title">학습 기록</span>
            <span id="totalTime" style="color:#007bff; font-weight:bold;">총 0시간 0분</span>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="단어 검색..." oninput="handleSearchInput()">
            <button class="find-btn" onclick="findNext()">다음 찾기 ▼</button>
        </div>
    </div>

    <div class="input-group">
        <input type="number" id="studyTime" placeholder="공부 시간 (분)">
        <div class="symbol-pad">
            <button class="sym-btn" onclick="insertSymbol('Δ')">Δ</button>
            <button class="sym-btn" onclick="insertSymbol('η')">η</button>
            <button class="sym-btn" onclick="insertSymbol('ρ')">ρ</button>
            <button class="sym-btn" onclick="insertSymbol('℃')">℃</button>
            <button class="sym-btn" onclick="insertSymbol('×')">×</button>
            <button class="sym-btn" onclick="insertSymbol('÷')">÷</button>
            <button class="sym-btn sup" onclick="insertSymbol('²')">²</button>
            <button class="sym-btn sup" onclick="insertSymbol('³')">³</button>
            <button class="sym-btn" onclick="insertSymbol('π')">π</button>
            <button class="sym-btn" onclick="insertSymbol('√')">√</button>
        </div>
        <textarea id="memo" rows="4" placeholder="내용을 입력하세요"></textarea>
        <button id="saveBtn" onclick="saveRecord()">기록 저장</button>
    </div>

    <div id="recordList"></div>

    <script>
        let currentMatchIndex = -1;
        let editingIndex = -1;

        function insertSymbol(sym) {
            const memo = document.getElementById('memo');
            const start = memo.selectionStart;
            const end = memo.selectionEnd;
            memo.value = memo.value.substring(0, start) + sym + memo.value.substring(end);
            memo.focus();
            memo.setSelectionRange(start + sym.length, start + sym.length);
        }

        function handleSearchInput() {
            currentMatchIndex = -1; // 검색어 바뀌면 인덱스 초기화
            displayRecords();
        }

        function saveRecord() {
            const timeInput = document.getElementById('studyTime');
            const memoInput = document.getElementById('memo');
            const time = timeInput.value;
            const memo = memoInput.value;
            if(!time && !memo) return;
            
            let records = JSON.parse(localStorage.getItem('studyRecords') || '[]');
            if (editingIndex >= 0) {
                records[editingIndex] = { ...records[editingIndex], time: time || 0, memo };
                editingIndex = -1;
                document.getElementById('saveBtn').innerText = '기록 저장';
                document.getElementById('saveBtn').style.background = '#007bff';
            } else {
                records.push({ time: time || 0, memo, date: new Date().toLocaleString() });
            }
            
            localStorage.setItem('studyRecords', JSON.stringify(records));
            timeInput.value = '';
            memoInput.value = '';
            displayRecords();
        }

        function displayRecords() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            const list = document.getElementById('recordList');
            const records = JSON.parse(localStorage.getItem('studyRecords') || '[]');
            
            const totalMinutes = records.reduce((sum, r) => sum + parseInt(r.time || 0), 0);
            document.getElementById('totalTime').innerText = `총 ${Math.floor(totalMinutes/60)}시간 ${totalMinutes%60}분`;

            list.innerHTML = records.slice().reverse().map((r, revIdx) => {
                const actualIndex = records.length - 1 - revIdx;
                let text = r.memo;
                
                if (searchTerm) {
                    // 대소문자 구분 없이 찾기 위해 정규식 사용
                    const regex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                    text = text.replace(regex, `<mark class="match">$1</mark>`);
                }

                return `
                    <div class="record-item">
                        <div class="record-date">${r.date} | ${r.time}분</div>
                        <div class="memo-text">${text}</div>
                        <div class="action-btns">
                            <button class="act-btn edit-btn" onclick="editRecord(${actualIndex})">수정</button>
                            <button class="act-btn del-btn" onclick="deleteRecord(${actualIndex})">삭제</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function findNext() {
            const matches = document.querySelectorAll('mark.match');
            if (matches.length === 0) {
                alert("찾는 단어가 없습니다.");
                return;
            }
            
            // 기존 강조 제거
            matches.forEach(m => m.classList.remove('current-match'));
            
            // 다음 위치 계산
            currentMatchIndex = (currentMatchIndex + 1) % matches.length;
            
            // 새 위치 강조 및 이동
            const current = matches[currentMatchIndex];
            current.classList.add('current-match');
            current.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function editRecord(index) {
            const records = JSON.parse(localStorage.getItem('studyRecords') || '[]');
            const record = records[index];
            document.getElementById('studyTime').value = record.time;
            document.getElementById('memo').value = record.memo;
            editingIndex = index;
            document.getElementById('saveBtn').innerText = '수정 완료';
            document.getElementById('saveBtn').style.background = '#ffc107';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function deleteRecord(index) {
            if(!confirm("삭제하시겠습니까?")) return;
            let records = JSON.parse(localStorage.getItem('studyRecords') || '[]');
            records.splice(index, 1);
            localStorage.setItem('studyRecords', JSON.stringify(records));
            displayRecords();
        }

        window.onload = displayRecords;
    </script>
</body>
</html>
